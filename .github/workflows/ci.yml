name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

permissions:
  contents: read

jobs:
  check:
    name: Lint, vet & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: gofmt
        run: |
          out="$(gofmt -s -l .)"
          if [ -n "$out" ]; then
            echo "These files are not gofmt-clean:"; echo "$out"; exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: latest

      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

      - name: Test
        run: go test -race -covermode=atomic -coverprofile=coverage.out ./...

  image:
    name: Docker build (validation)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # Keep the local-use Dockerfile building; the release image is built by
      # GoReleaser/ko, so this validates only (no push).
      - name: Build image
        run: docker build --build-arg VERSION=ci -t external-dns-namesilo-webhook:ci .

  # Pre-merge review by Claude. Gated on `check` so no tokens are spent on code
  # that doesn't already build, lint, vet, and pass tests under -race. Skipped
  # for non-PR events, for bot-authored PRs (e.g. release-please's release PRs),
  # and for PRs whose title carries [skip-review] or [WIP].
  review:
    name: Claude code review
    needs: check
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.user.login != 'github-actions[bot]' &&
      !contains(github.event.pull_request.title, '[skip-review]') &&
      !contains(github.event.pull_request.title, '[WIP]')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          model: "claude-opus-4-8"
          use_sticky_comment: true
          allowed_tools: ""
          direct_prompt: |
            ROLE: Senior Go engineer, pre-merge review of an ExternalDNS webhook provider for Namesilo DNS. Stack: Go 1.26; std-lib net/http via the external-dns `provider/webhook/api.StartHTTPApi` helper; a purpose-built typed JSON Namesilo client (internal rate limiter + per-zone TTL record cache); slog; Prometheus; distroless/nonroot image; release-please + GoReleaser/ko. Branch model develop+main. Greenfield — no backward-compat tolerated.

            STANCE:
            - Be skeptical but realistic. Most code is fine. Silence is approval.
            - No praise, no "looks good," no thank-you, no closing remarks.
            - Cite `path:LINE` for every finding. No vague advice.
            - Severity (anchor honestly — most real findings are MINOR):
              - BLOCKER — concrete bug, security gap, or invariant violation that should not merge. Rare.
              - MAJOR — concrete bug or choice that will cause real problems soon. Uncommon.
              - MINOR — real issue with bounded blast radius. Default tag for real findings.
              - NIT — preference the compiler doesn't catch. Use sparingly.
            - Skip categories with no real finding. Do not invent issues to fill slots.
            - gofmt/go vet/golangci-lint/govulncheck already ran and passed — don't spend budget on style or on vulns they'd catch.

            CHECK:
            1. Invariants — the API key is a secret: never logged, and scrubbed from transport (url.Error) failures; every outbound call carries a context with the bounded timeout; the rate limiter is never bypassed; record TTLs are clamped to Namesilo's 3600s floor in AdjustEndpoints (so the plan converges, not just on the write path); DOMAIN_FILTER stays required (zones are not auto-discovered); the webhook contract methods stay conformant (Records / ApplyChanges / AdjustEndpoints / GetDomainFilter); record ids are resolved at apply time by re-listing, never cached in endpoint.ProviderSpecific (Namesilo rotates record_id on update).
            2. Go correctness in this diff — errors wrapped with %w and never swallowed; no data races (shared maps/fields touched across goroutines — metrics server, cache, limiter); context cancellation/timeouts honoured; every resp.Body closed; response reads bounded; slices preallocated when the length is known; no goroutine leaks; output never depends on map-iteration order.
            3. Provider mapping in this diff — endpoint↔record mapping correct for A/AAAA/CNAME/MX/TXT (MX `<pref> <exchange>`, TXT quote handling); longest-suffix zone resolution and apex relativization; create/update/delete translation avoids reconcile churn.
            4. Namesilo client in this diff — success is reply.code==300; flexInt tolerates string-or-number; cache invalidated on every mutation; account-domain enumeration (if any) paginates rather than reading only the first page.
            5. Tests — table tests with httptest + the mock client cover the changed branches; race-sensitive code is exercised under -race.

            OUTPUT:

            **Verdict:** BLOCK / RISKY / OK

            **Findings:** (omit heading if none)
            - `[SEVERITY] path:LINE` — problem · why · fix.

            No strengths section, TL;DR, thank-you, or closing.
