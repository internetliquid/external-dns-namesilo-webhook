# Namesilo API credentials.
#
# This is a plain example. In a real cluster, manage this secret with
# Sealed Secrets, SOPS, or the External Secrets Operator instead of committing
# it. Never commit a real API key.
apiVersion: v1
kind: Secret
metadata:
  name: namesilo-credentials
  namespace: external-dns
type: Opaque
stringData:
  # Generate at https://www.namesilo.com/account/api-manager
  api-key: "REPLACE_WITH_YOUR_NAMESILO_API_KEY"
